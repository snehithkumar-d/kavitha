name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      # v0.1.0 ships assets/built/ checked in. Skip build step until v0.2+.

      # Fonts via Google Fonts CSS — no local fetch step.

      - name: Validate theme with gscan
        run: npx gscan@latest .
