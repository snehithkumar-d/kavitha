name: Deploy theme

# Manual trigger + tag push only. NOT every commit to main — that's how
# you publish broken themes by accident. (See loophole #25 in PLAN.)
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      # v0.1.0 ships assets/built/ checked in — no source-to-built compile step.
      # v0.2+ will populate src/ and add `npm ci && npm run build` here.

      - name: Validate theme with gscan
        run: npx gscan@latest .

      - name: Deploy to Ghost
        uses: TryGhost/action-deploy-theme@v1
        env:
          # TryGhost ships v1 on Node 20, deprecated by GitHub. Force Node 24
          # at the runner so the action keeps working past Sep 2026 cutoff.
          # Remove this once TryGhost publishes a v2 with native Node 24.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          api-url: ${{ secrets.GHOST_ADMIN_API_URL }}
          api-key: ${{ secrets.GHOST_ADMIN_API_KEY }}
          theme-name: kavitha
