name: Release zip

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npm run zip

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/kavitha.zip
          generate_release_notes: true
